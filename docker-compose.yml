version: '3.9'

services:
  # ── .NET Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./SLPSystems/SLPSystems.Web
      dockerfile: Dockerfile
    image: slp-backend:latest
    container_name: slp-backend
    restart: unless-stopped
    ports:
      - "5062:5062"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Data Source=/app/data/slpsystems.db"
      Cors__AllowedOrigins__0: "http://localhost:3000"
      Cors__AllowedOrigins__1: "${FRONTEND_URL:-http://localhost:3000}"
      Admin__Email: "${ADMIN_EMAIL:-admin@slpsystems.ca}"
      Admin__Password: "${ADMIN_PASSWORD:-Admin@123456}"
      Smtp__Host: "${SMTP_HOST:-}"
      Smtp__Port: "${SMTP_PORT:-587}"
      Smtp__Username: "${SMTP_USERNAME:-}"
      Smtp__Password: "${SMTP_PASSWORD:-}"
      RateLimit__MaxRequests: "${RATE_LIMIT:-100}"
      RateLimit__WindowSeconds: "60"
    volumes:
      - slp-data:/app/data
      - slp-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5062/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - slp-network

  # ── Next.js Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./slp-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:5062}"
    image: slp-frontend:latest
    container_name: slp-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://backend:5062}"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - slp-network

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: slp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - slp-logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - slp-network

volumes:
  slp-data:
    driver: local
  slp-logs:
    driver: local

networks:
  slp-network:
    driver: bridge
